dataset:
  name: gsm8k
  config_name: main
  split: test
  streaming: false
  prompt_column: question
  answer_column: answer
  id_column: null
  level_column: null
  category_column: null
  max_rows: 100
  filter_expr: null
  preprocessing_engine: hf
  saved_format: jsonl

model:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  dtype: bf16
  max_input_tokens: 4096
  max_new_tokens: 512
  temperature: 0.2
  top_p: 0.9
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  trust_remote_code: false

runtime:
  output_dir: runs/gsm8k_smoke
  num_workers: 2
  batch_size: 1
  generation_batch_size: 2
  prefetch_factor: 2
  resume: true
  seed: 1729

backend:
  kind: local
  slurm_partition: interactive-gpu
  slurm_gres: gpu:a40:1
  slurm_time: "02:00:00"
  cloud_provider: null
  cloud_profile: null

inference:
  backend: hf
  sglang_base_url: http://127.0.0.1:30000/v1
  sglang_api_key: null
  sglang_model: null
  sglang_timeout_s: 120.0
  sglang_max_concurrency: 8

telemetry:
  enabled: true
  flush_interval_s: 5.0
  wandb_project: generic-curriculum-transfer
  wandb_entity: null
  wandb_mode: offline
  wandb_api_key: null
  wandb_log_interval: 20
