dataset:
  name: EleutherAI/hendrycks_math
  config_name: null
  split: test
  streaming: false
  prompt_column: problem
  answer_column: solution
  id_column: null
  level_column: level
  category_column: type
  max_rows: null
  filter_expr: "int(level) <= 3"
  preprocessing_engine: hf
  saved_format: jsonl

model:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  dtype: bf16
  max_input_tokens: 7600
  max_new_tokens: 512
  temperature: 0.2
  top_p: 0.9
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  trust_remote_code: false

runtime:
  output_dir: runs/competitive_math
  num_workers: 4
  batch_size: 1
  generation_batch_size: 4
  prefetch_factor: 2
  resume: true
  seed: 1729

backend:
  kind: slurm
  slurm_partition: interactive-gpu
  slurm_gres: gpu:a40:4
  slurm_time: "08:00:00"
  cloud_provider: null
  cloud_profile: null

telemetry:
  enabled: true
  flush_interval_s: 5.0
  wandb_project: generic-curriculum-transfer
  wandb_entity: null
  wandb_mode: offline
  wandb_api_key: null
  wandb_log_interval: 20

sae:
  enabled: true
  repo: EleutherAI/sae-llama-3-8b-32x
  layers: [10, 16, 24, 28, 30]
  combo_layers: [10, 16, 24, 30]
  top_features_per_layer: 256
  top_k_neighbors: 5
  default_variant: cos07
